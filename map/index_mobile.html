<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meshtastic Kart</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; }
    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }
    #map { 
      height: 100%; 
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    /* Mobile-optimized controls */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      max-width: 400px;
    }
    
    @media (max-width: 768px) {
      .controls {
        left: 5px;
        right: 5px;
        top: 5px;
        padding: 10px;
        max-width: none;
      }
    }
    
    .controls.collapsed {
      padding: 8px 12px;
    }
    
    .controls.collapsed .controls-content {
      display: none;
    }
    
    .controls-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .controls.collapsed .controls-header {
      margin-bottom: 0;
    }
    
    .controls h2 {
      font-size: 1.1em;
      margin: 0;
      font-weight: 600;
    }
    
    .toggle-btn {
      background: #3388ff;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.9em;
      cursor: pointer;
      touch-action: manipulation;
    }
    
    .toggle-btn:active {
      background: #2266cc;
    }
    
    .controls input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px; /* Prevents zoom on iOS */
    }
    
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95em;
      margin-bottom: 8px;
      cursor: pointer;
      touch-action: manipulation;
    }
    
    .controls input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .legend {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 0.9em;
      color: #444;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .legend i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    
    /* Popup styling */
    .leaflet-popup-content {
      margin: 12px;
      min-width: 250px;
      max-width: 90vw;
    }
    
    .popup h3 {
      margin: 0 0 10px;
      font-size: 1.2em;
      color: #333;
    }
    
    .popup table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.95em;
    }
    
    .popup th {
      text-align: left;
      font-weight: 600;
      padding: 6px 12px 6px 0;
      white-space: nowrap;
      color: #666;
    }
    
    .popup td {
      padding: 6px 0;
      word-break: break-word;
    }
    
    .popup tr {
      border-bottom: 1px solid #f0f0f0;
    }
    
    .popup tr:last-child {
      border-bottom: none;
    }
    
    /* Loading indicator */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 2000;
      font-size: 1.1em;
    }
    
    .loading.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">Laster kart...</div>
  
  <div id="controls" class="controls">
    <div class="controls-header">
      <h2>Meshtastic Tromsø</h2>
      <button class="toggle-btn" onclick="toggleControls()">Skjul</button>
    </div>
    <div class="controls-content">
      <input id="searchInput" type="text" placeholder="Søk etter node..." autocomplete="off">
      <label>
        <input type="checkbox" id="onlyFavorites">
        Vis bare favoritter
      </label>
      <label>
        <input type="checkbox" id="toggleTrails" checked>
        Vis trails (24t)
      </label>
      <div class="legend">
        <span><i style="background:#ff8c00"></i> Favoritt</span>
        <span><i style="background:#3388ff"></i> Vanlig</span>
      </div>
    </div>
  </div>
  
  <div id="map"></div>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Toggle controls collapse
    function toggleControls() {
      const controls = document.getElementById('controls');
      const btn = controls.querySelector('.toggle-btn');
      controls.classList.toggle('collapsed');
      btn.textContent = controls.classList.contains('collapsed') ? 'Vis' : 'Skjul';
    }
    
    // Initialize map centered on Tromsø
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true
    }).setView([69.65, 18.96], 11);
    
    // Move zoom control to bottom right on mobile
    map.zoomControl.setPosition('bottomright');
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 18
    }).addTo(map);
    
    let nodesLayer = L.layerGroup().addTo(map);
    let trailsLayer = L.layerGroup().addTo(map);
    let allNodes = [];
    let favorites = new Set();
    
    // Hide loading after map loads
    map.whenReady(() => {
      document.getElementById('loading').classList.add('hidden');
    });
    
    function createPopupContent(props) {
      const fav = props.favorite ? '<span style="color:#ff8c00">★</span> ' : '';
      let html = `<div class="popup"><h3>${fav}${props.longName || props.id}</h3><table>`;
      
      const rows = [
        ['ID', props.id],
        ['Short Name', props.shortName],
        ['Hardware', props.hwModel],
        ['Battery', props.batteryLevel ? `${props.batteryLevel}%` : 'N/A'],
        ['Altitude', props.altitude ? `${props.altitude}m` : 'N/A'],
        ['SNR', props.snr ? `${props.snr} dB` : 'N/A'],
        ['Last Heard', props.lastHeard || 'N/A'],
        ['Since', props.lastHeardAgoSec ? formatDuration(props.lastHeardAgoSec) : 'N/A']
      ];
      
      if (props.label) rows.unshift(['Label', props.label]);
      if (props.note) rows.push(['Note', props.note]);
      
      rows.forEach(([key, val]) => {
        if (val && val !== 'N/A') {
          html += `<tr><th>${key}:</th><td>${val}</td></tr>`;
        }
      });
      
      html += '</table></div>';
      return html;
    }
    
    function formatDuration(seconds) {
      if (seconds < 60) return `${seconds}s siden`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m siden`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}t siden`;
      return `${Math.floor(seconds / 86400)}d siden`;
    }
    
    function loadNodes() {
      fetch(`/nodes.geojson?_=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          allNodes = data.features;
          renderNodes();
        })
        .catch(err => console.error('Error loading nodes:', err));
    }
    
    function loadTrails() {
      if (!document.getElementById('toggleTrails').checked) {
        trailsLayer.clearLayers();
        return;
      }
      
      fetch(`/trails.geojson?_=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
          trailsLayer.clearLayers();
          data.features.forEach(f => {
            L.geoJSON(f, {
              style: {
                color: f.properties.favorite ? '#ff8c00' : '#3388ff',
                weight: 2,
                opacity: 0.6
              }
            }).addTo(trailsLayer);
          });
        })
        .catch(err => console.error('Error loading trails:', err));
    }
    
    function renderNodes() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const onlyFavs = document.getElementById('onlyFavorites').checked;
      
      nodesLayer.clearLayers();
      
      let displayed = 0;
      allNodes.forEach(f => {
        const props = f.properties;
        const isFav = props.favorite;
        
        if (onlyFavs && !isFav) return;
        
        const searchable = [
          props.id,
          props.longName,
          props.shortName,
          props.label
        ].filter(Boolean).join(' ').toLowerCase();
        
        if (searchTerm && !searchable.includes(searchTerm)) return;
        
        const color = isFav ? '#ff8c00' : '#3388ff';
        const marker = L.circleMarker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {
          radius: isFav ? 8 : 6,
          fillColor: color,
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        });
        
        marker.bindPopup(createPopupContent(props), { maxWidth: 300 });
        marker.addTo(nodesLayer);
        displayed++;
      });
      
      // Auto-zoom to displayed nodes if search is active
      if (searchTerm && displayed > 0 && displayed < 20) {
        const bounds = nodesLayer.getBounds();
        if (bounds.isValid()) {
          map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
        }
      }
    }
    
    // Event listeners
    document.getElementById('searchInput').addEventListener('input', renderNodes);
    document.getElementById('onlyFavorites').addEventListener('change', renderNodes);
    document.getElementById('toggleTrails').addEventListener('change', loadTrails);
    
    // Initial load and refresh
    loadNodes();
    loadTrails();
    
    setInterval(() => {
      loadNodes();
      loadTrails();
    }, 60000); // Update every minute
    
    // Handle orientation changes on mobile
    window.addEventListener('orientationchange', () => {
      setTimeout(() => map.invalidateSize(), 100);
    });
  </script>
</body>
</html>
